name: Prompt CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write

jobs:
  graphrag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go test (graphrag)
        run: cd graphrag && go test ./...

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Audit prompts
        env:
          PROMPT_LEDGER_ROOT: ${{ github.workspace }}
        run: prompt-ledger audit

      - name: Scenario tests
        env:
          PROMPT_LEDGER_ROOT: ${{ github.workspace }}
        run: prompt-ledger test

      - name: Pytest
        env:
          PROMPT_LEDGER_ROOT: ${{ github.workspace }}
        run: pytest -q

  promote:
    needs: [validate, graphrag]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Promote staging pins to production
        env:
          PROMPT_LEDGER_ROOT: ${{ github.workspace }}
          PROMPT_OPTIMIZATION_API_URL: ${{ secrets.PROMPT_OPTIMIZATION_API_URL }}
        run: |
          prompt-ledger promote --environment production --sync-from staging --notify-optimization-api

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prompts/manifest.yaml
          if git diff --staged --quiet; then
            echo "No manifest changes."
          else
            git commit -m "chore(prompts): promote staging pins to production"
            git push
          fi
